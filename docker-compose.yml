version: '3.8'

services:

  # ── Node.js Application ──────────────────────────────────
  app:
    build: .                          # Build image from ./Dockerfile
    container_name: docker-demo-app
    ports:
      - "3000:3000"                   # host:container port mapping
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URL=mongodb://db:27017/dockerdemo
    depends_on:
      db:
        condition: service_healthy    # Wait until MongoDB is ready
    restart: unless-stopped

  # ── MongoDB Database ─────────────────────────────────────
  db:
    image: mongo:7                    # Official MongoDB 7 image
    container_name: docker-demo-db
    ports:
      - "27017:27017"                 # Expose for local DB tools (optional)
    volumes:
      - db-data:/data/db              # Persist data between restarts
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ── Named Volumes ─────────────────────────────────────────
volumes:
  db-data:                            # MongoDB data persists across container restarts
